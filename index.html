<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timeslot Booking · SWEP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:opsz,wght@6..72,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--paper:#f5efe2;--paper-2:#efe7d6;--ink:#241f17;--ink-soft:#5a5142;--gold:#b08400;--gold-deep:#8a6500;--line:#d9cdb4}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%, #fbf6ea, transparent 55%), var(--paper);
    color:var(--ink); font-family:"Newsreader",Georgia,serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px}
  .card{text-align:center; max-width:520px; width:100%}
  .eyebrow{font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.24em; text-transform:uppercase; color:var(--gold-deep)}
  h1{font-family:"Fraunces",serif; font-weight:500; font-size:40px; margin:.2em 0 .1em}
  p.sub{color:var(--ink-soft); margin:0 0 28px}
  .links{display:grid; gap:14px}
  a.tile{display:block; text-decoration:none; color:var(--ink); background:var(--paper-2); border:1px solid var(--line);
    border-radius:14px; padding:20px 22px; text-align:left; box-shadow:0 1px 0 #fff8 inset, 0 10px 28px -20px #3a2f1c80; transition:.14s}
  a.tile:hover{border-color:var(--gold); transform:translateY(-1px)}
  a.tile .t{font-family:"Fraunces",serif; font-size:21px; font-weight:500}
  a.tile .d{color:var(--ink-soft); font-size:15px; margin-top:3px}
  a.tile .arrow{float:right; color:var(--gold-deep); font-size:22px}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Satriwithaya · English Program</div>
    <h1>Timeslot Booking</h1>
    <p class="sub">Reserve a speaking slot, or manage the schedule.</p>
    <div class="links">
      <a class="tile" href="student.html"><span class="arrow">→</span><div class="t">I'm a student</div><div class="d">Pick your name and book an open slot.</div></a>
      <a class="tile" href="board.html"><span class="arrow">→</span><div class="t">Booking board</div><div class="d">View the full schedule and check your reservation.</div></a>
      <a class="tile" href="teacher.html"><span class="arrow">→</span><div class="t">I'm the teacher</div><div class="d">Open dates, set timeslots, view reservations.</div></a>
    </div>
  </div>
</body>
</html>
